name: Mutation Testing

# Mutation testing proves the suite catches injected bugs, not just executes lines
# (TESTING_STRATEGY.md §4). It is expensive, so it runs on demand and weekly rather
# than on every PR. The client job (Stryker) enforces a hard break threshold; the
# python job (mutmut) is an advisory baseline for the codec modules, whose I/O and
# lookup-table density makes a hard mutation floor impractical.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC

permissions:
  contents: read

jobs:
  python-mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      # mutmut is pinned to 2.x: it mutates the codec sources in place, which the
      # tests import directly from the working tree. mutmut 3.x's build-sandbox
      # cannot resolve the (non-installed) `spoolman` package and aborts. mutmut 2.x
      # also does not read the `[tool.mutmut]` pyproject section, so the scope and
      # runner are passed explicitly on the CLI here (kept in sync with that section,
      # which documents the intent). The runner is the NFC unit suite that covers
      # these modules — fast, and free of the DB integration tests.
      # Advisory only (`|| true`): codec code is dense with hardware I/O, defensive
      # broad-except and large lookup tables, so the score is a tracked baseline, not
      # a hard gate. The enforced mutation gate lives in client-mutation (Stryker).
      - name: Run mutmut on crown-jewel modules
        run: >
          uv run --with 'mutmut<3' mutmut run
          --paths-to-mutate "spoolman/tigertag_codec.py,spoolman/qidi_codec.py,spoolman/openprinttag_codec.py"
          --runner "python -m pytest -x -q tests/nfc"
          || true

      - name: Report results
        run: uv run --with 'mutmut<3' mutmut results || true

  client-mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run Stryker on crown-jewel modules
        # @stryker-mutator/core + the vitest-runner plugin are dev dependencies, so
        # Stryker resolves the runner from client/node_modules after `npm ci`.
        # No `|| true`: the baseline is established (~87% mutation score), so Stryker's
        # break threshold (80) now enforces a hard floor on this scheduled run.
        run: |
          cd client
          npm run mutation
