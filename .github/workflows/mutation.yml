name: Mutation Testing

# Mutation testing proves the suite catches injected bugs, not just executes lines
# (TESTING_STRATEGY.md §4). It is expensive, so it runs on demand and weekly rather
# than on every PR. Neither job fails the build yet — they establish the baseline
# score for the crown-jewel modules; tighten to a hard gate once the score settles.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC

permissions:
  contents: read

jobs:
  python-mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.26"

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Run mutmut on crown-jewel modules
        run: uv run --with mutmut mutmut run || true

      - name: Report results
        run: uv run --with mutmut mutmut results || true

  client-mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run Stryker on crown-jewel modules
        # @stryker-mutator/core + the vitest-runner plugin are dev dependencies, so
        # Stryker resolves the runner from client/node_modules after `npm ci`.
        # No `|| true`: the baseline is established (~87% mutation score), so Stryker's
        # break threshold (80) now enforces a hard floor on this scheduled run.
        run: |
          cd client
          npm run mutation
