<!doctype html>

<html lang="%paraglide.lang%" data-theme="dark" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />

		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<meta name="theme-color" content="#1f1f1f" />
		<title>Spoolman</title>

		<!-- Resolve the saved color theme before first paint to avoid a flash of the
		     wrong theme. Mirrors lib/stores/theme.svelte.ts. -->
		<script>
			(function () {
				try {
					var p = localStorage.getItem('spoolman-v2-theme') || 'system';
					var t =
						p === 'light' || p === 'dark'
							? p
							: window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', t);
					var m = document.querySelector('meta[name="theme-color"]');
					if (m) m.setAttribute('content', t === 'light' ? '#f2f1ee' : '#1f1f1f');
				} catch (e) {}
			})();
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />

		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
